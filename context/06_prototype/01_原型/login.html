<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 多店铺积分商城</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Vue3 CDN -->
  <script src="https://unpkg.com/vue@3.4.0/dist/vue.global.js"></script>

  <!-- Variables CSS -->
  <link rel="stylesheet" href="variables.css">

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .fill-icon {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .input-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-outline);
      font-size: 20px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper .input {
      padding-left: 52px;
    }
  </style>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#004ac6',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#faf8ff] dark:bg-[#121218] min-h-screen flex items-center justify-center relative font-body antialiased">

  <div id="app">
    <!-- Atmospheric Background -->
    <div class="bg-mesh">
      <div class="bg-mesh-secondary"></div>
      <div class="bg-mesh-tertiary"></div>
    </div>

    <!-- Login Card -->
    <div class="relative z-10 w-full max-w-md px-6 animate-slide-up">
      <div class="glass-strong rounded-3xl p-10 shadow-xl">

        <!-- Logo & Title -->
        <div class="text-center mb-10">
          <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-[#004ac6] to-[#712ae2] flex items-center justify-center text-white shadow-lg mx-auto mb-5">
            <span class="material-symbols-outlined fill-icon text-3xl">stars</span>
          </div>
          <h1 class="font-display-lg text-[28px] text-[#191b23] dark:text-white/90 mb-2">欢迎回来</h1>
          <p class="font-body-md text-[#737686] dark:text-white/60">登录到多店铺积分商城</p>
        </div>

        <!-- Login Form -->
        <form @submit.prevent="handleLogin" class="space-y-5">

          <!-- Username -->
          <div class="input-wrapper">
            <span class="material-symbols-outlined input-icon">account_circle</span>
            <input
              v-model="form.username"
              type="text"
              class="input"
              :class="{ 'input-error': errors.username }"
              placeholder="请输入用户名"
              @input="errors.username = ''"
            >
            <p v-if="errors.username" class="text-sm text-[#EF4444] mt-2 px-1">{{ errors.username }}</p>
          </div>

          <!-- Password -->
          <div class="input-wrapper">
            <span class="material-symbols-outlined input-icon">lock</span>
            <input
              v-model="form.password"
              type="password"
              class="input"
              :class="{ 'input-error': errors.password }"
              placeholder="请输入密码"
              @input="errors.password = ''"
            >
            <p v-if="errors.password" class="text-sm text-[#EF4444] mt-2 px-1">{{ errors.password }}</p>
          </div>

          <!-- Remember & Forgot -->
          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" v-model="form.remember" class="w-4 h-4 rounded border-white/50 bg-white/40 checked:bg-primary accent-primary">
              <span class="text-[#737686] dark:text-white/60">记住我</span>
            </label>
            <a href="#" class="text-[#004ac6] dark:text-blue-400 hover:underline">忘记密码？</a>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            class="btn btn-primary btn-lg w-full mt-6"
            :disabled="loading"
          >
            <span v-if="loading" class="material-symbols-outlined animate-spin-slow">progress_activity</span>
            <span v-else class="material-symbols-outlined">login</span>
            <span>{{ loading ? '登录中...' : '登录' }}</span>
          </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center gap-4 my-8">
          <div class="flex-1 h-px bg-gradient-to-r from-transparent via-white/30 to-transparent"></div>
          <span class="font-label-md text-[#737686] dark:text-white/40">或</span>
          <div class="flex-1 h-px bg-gradient-to-r from-transparent via-white/30 to-transparent"></div>
        </div>

        <!-- Register Link -->
        <p class="text-center font-body-md text-[#737686] dark:text-white/60">
          还没有账号？
          <a href="register.html" class="text-[#004ac6] dark:text-blue-400 font-semibold hover:underline">立即注册</a>
        </p>
      </div>

      <!-- Copyright -->
      <p class="text-center text-xs text-[#737686]/60 dark:text-white/30 mt-6">
        © 2026 多店铺积分商城系统. All rights reserved.
      </p>
    </div>

    <!-- Theme Toggle Button -->
    <button
      @click="showThemePanel = !showThemePanel"
      class="theme-btn group"
    >
      <span class="material-symbols-outlined text-2xl group-hover:rotate-45 transition-transform duration-500">dark_mode</span>
    </button>

    <!-- Theme Selection Panel -->
    <transition name="fade">
      <div v-if="showThemePanel" class="theme-panel animate-slide-up">
        <!-- Color Theme Selection -->
        <div class="mb-6">
          <p class="font-label-md text-label-md text-[#737686] mb-3">主题颜色</p>
          <div class="flex gap-3">
            <button
              @click="setTheme('')"
              class="w-10 h-10 rounded-full bg-[#004ac6] border-2 border-white shadow-md hover:scale-110 transition-all"
              title="科技蓝"
            ></button>
            <button
              @click="setTheme('fresh-green')"
              class="w-10 h-10 rounded-full bg-[#10B981] border-2 border-white shadow-md hover:scale-110 transition-all"
              title="清新绿"
            ></button>
            <button
              @click="setTheme('romantic-purple')"
              class="w-10 h-10 rounded-full bg-[#8B5CF6] border-2 border-white shadow-md hover:scale-110 transition-all"
              title="浪漫紫"
            ></button>
            <button
              @click="setTheme('vibrant-pink')"
              class="w-10 h-10 rounded-full bg-[#EC4899] border-2 border-white shadow-md hover:scale-110 transition-all"
              title="活力粉"
            ></button>
            <button
              @click="setTheme('pure-white')"
              class="w-10 h-10 rounded-full bg-[#1F2937] border-2 border-white shadow-md hover:scale-110 transition-all"
              title="纯净白"
            ></button>
          </div>
        </div>

        <!-- Dark Mode Toggle -->
        <div class="flex items-center justify-between">
          <span class="font-body-md text-[#737686]">暗色模式</span>
          <button
            @click="toggleDarkMode"
            :class="[
              'w-12 h-6 rounded-full relative transition-all duration-200',
              isDark ? 'bg-[#004ac6]' : 'bg-[#e7e7f3]'
            ]"
          >
            <span
              :class="[
                'absolute top-1 w-4 h-4 rounded-full bg-white shadow transition-all duration-200',
                isDark ? 'left-7' : 'left-1'
              ]"
            ></span>
          </button>
        </div>
      </div>
    </transition>
  </div>

  <script>
    const { createApp, ref, reactive } = Vue;

    createApp({
      setup() {
        const form = reactive({
          username: '',
          password: '',
          remember: false
        });

        const errors = reactive({
          username: '',
          password: ''
        });

        const loading = ref(false);
        const showThemePanel = ref(false);
        const isDark = ref(false);

        const handleLogin = async () => {
          // Validate
          errors.username = '';
          errors.password = '';

          if (!form.username.trim()) {
            errors.username = '请输入用户名';
            return;
          }

          if (!form.password.trim()) {
            errors.password = '请输入密码';
            return;
          }

          // Simulate login
          loading.value = true;

          await new Promise(resolve => setTimeout(resolve, 1500));

          loading.value = false;
          alert('登录成功！即将跳转到首页...');
        };

        const setTheme = (theme) => {
          if (theme) {
            document.documentElement.setAttribute('data-theme', theme);
          } else {
            document.documentElement.removeAttribute('data-theme');
          }
        };

        const toggleDarkMode = () => {
          isDark.value = !isDark.value;
          if (isDark.value) {
            document.documentElement.setAttribute('data-mode', 'dark');
          } else {
            document.documentElement.removeAttribute('data-mode');
          }
        };

        return {
          form,
          errors,
          loading,
          showThemePanel,
          isDark,
          handleLogin,
          setTheme,
          toggleDarkMode
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
