<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>消息通知 - ShopAdmin</title>
  <script src="https://unpkg.com/vue@3.4.0/dist/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --color-primary: #004ac6;
      --color-secondary: #712ae2;
      --color-on-primary: #ffffff;
      --color-on-surface: #191b23;
      --color-on-surface-variant: #434655;
      --color-outline: #737686;
      --color-success: #10B981;
      --color-warning: #F59E0B;
      --color-danger: #EF4444;
      --color-glass-bg: rgba(255, 255, 255, 0.6);
      --color-glass-border: rgba(255, 255, 255, 0.3);
      --font-display: 'Manrope', system-ui, sans-serif;
      --font-headline: 'Manrope', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }

    .glass {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.03), inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    .sidebar-float {
      margin: 12px;
      width: 256px;
      height: calc(100vh - 24px);
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 28px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    }

    .topbar-float {
      margin: 12px;
      margin-left: 0;
      height: 68px;
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 20px;
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
    }

    .content-area {
      margin: 12px;
      margin-left: 0;
      margin-right: 12px;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 28px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 16px;
      color: #4b5563;
      transition: all 0.25s ease;
      cursor: pointer;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 14px;
      border: 1px solid transparent;
    }

    .nav-item:hover {
      background: rgba(102, 126, 234, 0.1);
      color: var(--color-primary);
      transform: translateX(4px);
      border-color: rgba(102, 126, 234, 0.2);
    }

    .nav-item.active {
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      color: white;
      box-shadow: 0 8px 32px rgba(0, 74, 198, 0.35);
      border-color: transparent;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .fill-icon {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--color-outline); border-radius: 3px; opacity: 0.5; }

    .tab-btn {
      padding: 8px 20px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-on-surface-variant);
      background: transparent;
      border: 1px solid transparent;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .tab-btn:hover {
      background: rgba(0, 74, 198, 0.08);
      color: var(--color-primary);
    }

    .tab-btn.active {
      background: var(--color-primary);
      color: white;
      box-shadow: 0 4px 16px rgba(0, 74, 198, 0.3);
    }

    .badge-system { background: rgba(0, 74, 198, 0.1); color: #004ac6; }
    .badge-order { background: rgba(16, 185, 129, 0.1); color: #10B981; }
    .badge-activity { background: rgba(139, 92, 246, 0.1); color: #8B5CF6; }

    .unread-dot {
      width: 8px;
      height: 8px;
      background: #EF4444;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
    }

    .message-item {
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .message-item:hover {
      background: rgba(255, 255, 255, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
    }

    .message-item.unread {
      background: rgba(0, 74, 198, 0.03);
      border-left: 3px solid var(--color-primary);
    }

    .btn-action {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
    }

    .btn-mark-read {
      background: rgba(0, 74, 198, 0.1);
      color: var(--color-primary);
    }

    .btn-mark-read:hover {
      background: var(--color-primary);
      color: white;
    }

    .btn-delete {
      background: rgba(239, 68, 68, 0.1);
      color: var(--color-danger);
    }

    .btn-delete:hover {
      background: var(--color-danger);
      color: white;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-fade-in {
      animation: fadeIn 0.3s ease;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
  </style>
  <style>
    
  </style>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <!-- 公共样式表 -->
  <link rel="stylesheet" href="shop-common.css"/>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#004ac6",
            secondary: "#712ae2",
            "on-surface": "#191b23",
            "on-surface-variant": "#434655",
          },
          borderRadius: { "3xl": "2.5rem" },
          fontFamily: {
            display: ["Manrope", "system-ui", "sans-serif"],
            headline: ["Manrope", "system-ui", "sans-serif"],
            body: ["Inter", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
</head>
<body class="bg-[#faf8ff] min-h-screen flex overflow-hidden relative font-body antialiased">
  <div id="app">
    <!-- Atmospheric Background -->
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
      <div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] rounded-full bg-blue-200 blur-[120px] opacity-40 mix-blend-multiply"></div>
      <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-purple-200 blur-[150px] opacity-30 mix-blend-multiply"></div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar-float flex flex-col fixed left-0 top-0 z-40">
      <div class="p-6 border-b border-white/30">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-[#004ac6] to-[#712ae2] flex items-center justify-center text-white shadow-lg">
            <span class="material-symbols-outlined fill-icon text-2xl">generating_tokens</span>
          </div>
          <div class="flex flex-col">
            <span class="text-lg font-bold text-[#191b23] leading-tight">ShopAdmin</span>
            <span class="text-xs text-[#737686] uppercase tracking-wider font-semibold">系统管理</span>
          </div>
        </div>
      </div>

      <nav class="flex-1 px-4 py-6 flex flex-col gap-2 overflow-y-auto custom-scrollbar">
        <div v-for="(item, index) in navItems" :key="index"
             :class="['nav-item', { active: item.active }]"
             @click="setActive(index)">
          <span class="material-symbols-outlined nav-item-icon" :class="{ 'fill-icon': item.active }">{{ item.icon }}</span>
          <span>{{ item.name }}</span>
          <span v-if="item.name === '消息通知'" class="ml-auto bg-[#EF4444] text-white text-xs px-2 py-0.5 rounded-full">3</span>
        </div>
      </nav>

      <div class="px-4 mt-auto border-t border-white/30 pt-4">
        <div class="nav-item text-[#737686] hover:text-[#EF4444] hover:bg-red-50/50">
          <span class="material-symbols-outlined nav-item-icon">logout</span>
          <span>退出登录</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="flex flex-col relative z-10 ml-72" style="width: calc(100vw - 288px); height: 100vh;">
      <!-- Top Navigation Bar -->
      <header class="topbar-float flex items-center justify-between px-6" style="width: calc(100% - 24px);">
        <div class="flex items-center gap-4">
          <span class="text-xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-[#004ac6] to-[#2563eb] uppercase tracking-tight">消息通知</span>
        </div>
        <div class="flex items-center gap-4">
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[#737686] text-lg">search</span>
            <input v-model="searchQuery" class="bg-white/40 border border-white/50 rounded-full py-2.5 pl-12 pr-6 text-sm text-[#191b23] placeholder-[#737686] focus:outline-none focus:ring-2 focus:ring-[#004ac6]/20 focus:bg-white/60 transition-all w-48" placeholder="搜索消息..." type="text"/>
          </div>
          <div class="flex items-center gap-2 bg-white/50 p-1.5 rounded-2xl">
            <button class="p-2 rounded-xl hover:bg-white transition-all text-[#737686] hover:text-[#004ac6]">
              <span class="material-symbols-outlined">notifications</span>
              <span v-if="unreadCount > 0" class="absolute top-1.5 right-1.5 w-2 h-2 bg-[#EF4444] rounded-full"></span>
            </button>
            <button class="p-1.5 rounded-xl hover:bg-white transition-all text-[#737686] hover:text-[#004ac6]">
              <span class="material-symbols-outlined">account_circle</span>
            </button>
          </div>
        </div>
      </header>

      <!-- Content Area -->
      <main class="content-area overflow-y-auto p-6" style="flex: 1;">
        <div class="glass-card rounded-2xl p-6 animate-fade-in">
          <!-- Header Section -->
          <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[#004ac6] to-[#712ae2] flex items-center justify-center text-white">
                <span class="material-symbols-outlined fill-icon">notifications</span>
              </div>
              <div>
                <h1 class="text-xl font-bold text-[#191b23]">我的消息</h1>
                <p class="text-sm text-[#737686]">共 {{ messages.length }} 条消息，未读 {{ unreadCount }} 条</p>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <button @click="markAllRead" class="btn-action btn-mark-read">
                <span class="material-symbols-outlined text-sm">done_all</span>
                全部标为已读
              </button>
              <button @click="deleteSelected" class="btn-action btn-delete" :disabled="selectedMessages.length === 0">
                <span class="material-symbols-outlined text-sm">delete</span>
                删除
              </button>
            </div>
          </div>

          <!-- Type Tabs -->
          <div class="flex items-center gap-2 mb-6 pb-4 border-b border-white/30">
            <button v-for="tab in tabs" :key="tab.key"
                    @click="activeTab = tab.key"
                    :class="['tab-btn', { active: activeTab === tab.key }]">
              {{ tab.name }}
              <span v-if="tab.key !== 'all' && tabCounts[tab.key] > 0" class="ml-1 bg-white/30 px-2 py-0.5 rounded-full text-xs">
                {{ tabCounts[tab.key] }}
              </span>
            </button>
          </div>

          <!-- Messages List -->
          <div v-if="filteredMessages.length > 0" class="space-y-3">
            <div v-for="msg in filteredMessages" :key="msg.id"
                 :class="['glass-card rounded-xl p-4 message-item', { unread: !msg.read }]">
              <div class="flex items-start gap-4">
                <!-- Checkbox -->
                <div class="flex items-center pt-1">
                  <input type="checkbox" :checked="selectedMessages.includes(msg.id)"
                         @change="toggleSelect(msg.id)"
                         class="w-5 h-5 rounded border-2 border-[#737686]/30 cursor-pointer accent-[#004ac6]"/>
                </div>

                <!-- Icon -->
                <div :class="['w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0',
                  msg.type === 'system' ? 'bg-blue-100' :
                  msg.type === 'order' ? 'bg-green-100' : 'bg-purple-100']">
                  <span :class="['material-symbols-outlined fill-icon text-xl',
                    msg.type === 'system' ? 'text-[#004ac6]' :
                    msg.type === 'order' ? 'text-[#10B981]' : 'text-[#8B5CF6]']">
                    {{ msg.icon }}
                  </span>
                </div>

                <!-- Content -->
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2 mb-1">
                    <span v-if="!msg.read" class="unread-dot"></span>
                    <h3 class="font-semibold text-[#191b23] truncate">{{ msg.title }}</h3>
                  </div>
                  <p class="text-sm text-[#737686] line-clamp-1 mb-2">{{ msg.content }}</p>
                  <div class="flex items-center gap-3">
                    <span :class="['badge text-xs px-2 py-1 rounded-full font-medium',
                      msg.type === 'system' ? 'badge-system' :
                      msg.type === 'order' ? 'badge-order' : 'badge-activity']">
                      {{ msg.typeName }}
                    </span>
                    <span class="text-xs text-[#737686]">{{ msg.time }}</span>
                  </div>
                </div>

                <!-- Actions -->
                <div class="flex items-center gap-2">
                  <button v-if="!msg.read" @click.stop="markRead(msg.id)" class="btn-action btn-mark-read text-xs px-3 py-1.5">
                    标为已读
                  </button>
                  <button @click.stop="deleteMessage(msg.id)" class="p-2 rounded-lg hover:bg-red-50 transition-all text-[#737686] hover:text-[#EF4444]">
                    <span class="material-symbols-outlined text-lg">delete</span>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Empty State -->
          <div v-else class="empty-state">
            <div class="w-20 h-20 rounded-full bg-gradient-to-br from-[#e7e7f3] to-[#f3f3fe] flex items-center justify-center mx-auto mb-4">
              <span class="material-symbols-outlined text-4xl text-[#737686]">inbox</span>
            </div>
            <h3 class="text-lg font-semibold text-[#191b23] mb-2">暂无消息</h3>
            <p class="text-sm text-[#737686]">当前分类下没有消息通知</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const { createApp, ref, computed } = Vue;

    createApp({
      setup() {
        const navItems = ref([
          { name: 'Dashboard', icon: 'dashboard', active: false },
          { name: '店铺管理', icon: 'storefront', active: false },
          { name: '用户管理', icon: 'group', active: false },
          { name: '订单管理', icon: 'receipt_long', active: false },
          { name: '消息通知', icon: 'notifications', active: true },
          { name: '个人中心', icon: 'person', active: false }
        ]);

        const tabs = ref([
          { name: '全部', key: 'all' },
          { name: '系统通知', key: 'system' },
          { name: '订单通知', key: 'order' },
          { name: '活动通知', key: 'activity' }
        ]);

        const messages = ref([
          { id: 1, type: 'system', typeName: '系统通知', icon: 'settings', title: '系统升级通知', content: '系统将于本周六凌晨2:00-4:00进行升级维护，届时部分功能将暂停使用，请提前做好准备。', time: '10分钟前', read: false },
          { id: 2, type: 'order', typeName: '订单通知', icon: 'shopping_cart', title: '新订单提醒', content: '您有一笔新订单，订单号：DD20260426001，金额：¥299.00，请及时处理。', time: '30分钟前', read: false },
          { id: 3, type: 'activity', typeName: '活动通知', icon: 'campaign', title: '618大促活动火热进行中', content: '618年中大促活动火热进行中，全场商品低至5折，更有满减优惠等你来抢！', time: '2小时前', read: false },
          { id: 4, type: 'system', typeName: '系统通知', icon: 'info', title: '账号安全提醒', content: '您的账号在另一台设备登录，如非本人操作请及时修改密码。', time: '3小时前', read: true },
          { id: 5, type: 'order', typeName: '订单通知', icon: 'local_shipping', title: '订单已发货', content: '您的订单已发货，快递单号：SF1234567890，预计2-3天送达。', time: '5小时前', read: true },
          { id: 6, type: 'activity', typeName: '活动通知', icon: 'card_giftcard', title: '新人专享福利', content: '新用户注册即送100元新人优惠券大礼包，首次购物满99元可用。', time: '1天前', read: true },
          { id: 7, type: 'order', typeName: '订单通知', icon: 'receipt', title: '订单完成通知', content: '您购买的商品已完成签收，感谢您的购买，欢迎您对商品进行评价。', time: '2天前', read: true }
        ]);

        const activeTab = ref('all');
        const selectedMessages = ref([]);
        const searchQuery = ref('');

        const unreadCount = computed(() => messages.value.filter(m => !m.read).length);

        const tabCounts = computed(() => ({
          system: messages.value.filter(m => m.type === 'system' && !m.read).length,
          order: messages.value.filter(m => m.type === 'order' && !m.read).length,
          activity: messages.value.filter(m => m.type === 'activity' && !m.read).length
        }));

        const filteredMessages = computed(() => {
          let list = messages.value;
          if (activeTab.value !== 'all') {
            list = list.filter(m => m.type === activeTab.value);
          }
          if (searchQuery.value) {
            const q = searchQuery.value.toLowerCase();
            list = list.filter(m => m.title.toLowerCase().includes(q) || m.content.toLowerCase().includes(q));
          }
          return list;
        });

        const setActive = (index) => {
          navItems.value.forEach((item, i) => item.active = i === index);
        };

        const toggleSelect = (id) => {
          const idx = selectedMessages.value.indexOf(id);
          if (idx > -1) {
            selectedMessages.value.splice(idx, 1);
          } else {
            selectedMessages.value.push(id);
          }
        };

        const markRead = (id) => {
          const msg = messages.value.find(m => m.id === id);
          if (msg) msg.read = true;
        };

        const markAllRead = () => {
          messages.value.forEach(m => m.read = true);
          selectedMessages.value = [];
        };

        const deleteMessage = (id) => {
          const idx = messages.value.findIndex(m => m.id === id);
          if (idx > -1) messages.value.splice(idx, 1);
          const sIdx = selectedMessages.value.indexOf(id);
          if (sIdx > -1) selectedMessages.value.splice(sIdx, 1);
        };

        const deleteSelected = () => {
          messages.value = messages.value.filter(m => !selectedMessages.value.includes(m.id));
          selectedMessages.value = [];
        };

        return {
          navItems,
          tabs,
          messages,
          activeTab,
          selectedMessages,
          searchQuery,
          unreadCount,
          tabCounts,
          filteredMessages,
          setActive,
          toggleSelect,
          markRead,
          markAllRead,
          deleteMessage,
          deleteSelected
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
