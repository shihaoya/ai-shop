<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店铺管理平台 - 多店铺积分商城</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Vue3 CDN -->
  <script src="https://unpkg.com/vue@3.4.0/dist/vue.global.js"></script>

  <style>
    /* Theme Variables */
    :root {
      --theme-primary: #004ac6;
      --theme-secondary: #2563eb;
      --theme-rgb-primary: 0, 74, 198;
      --theme-gradient: linear-gradient(135deg, #004ac6 0%, #2563eb 100%);
      --color-on-primary: #ffffff;
      --color-success: #10B981;
      --color-warning: #F59E0B;
      --color-danger: #EF4444;
      --color-outline: #737686;
      --color-on-surface: #191b23;
      --color-on-surface-variant: #434655;
      --color-glass-bg: rgba(255, 255, 255, 0.6);
      --color-glass-border: rgba(255, 255, 255, 0.3);
      --font-display: 'Manrope', system-ui, sans-serif;
      --font-headline: 'Manrope', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --font-label: 'Inter', system-ui, sans-serif;
    }

    /* Dark Mode */
    [data-mode="dark"] {
      --color-glass-bg: rgba(0, 0, 0, 0.4);
      --color-glass-border: rgba(255, 255, 255, 0.1);
      --color-on-surface: #f0f0fb;
      --color-on-surface-variant: #a0a4b8;
    }

    /* Theme Colors */
    [data-theme="fresh-green"] {
      --theme-primary: #10B981;
      --theme-secondary: #059669;
      --theme-rgb-primary: 16, 185, 129;
    }
    [data-theme="romantic-purple"] {
      --theme-primary: #8B5CF6;
      --theme-secondary: #7C3AED;
      --theme-rgb-primary: 139, 92, 246;
    }
    [data-theme="vibrant-pink"] {
      --theme-primary: #EC4899;
      --theme-secondary: #DB2777;
      --theme-rgb-primary: 236, 72, 153;
    }
    [data-theme="pure-white"] {
      --theme-primary: #1F2937;
      --theme-secondary: #374151;
      --theme-rgb-primary: 31, 41, 55;
    }
    [data-theme="classic-black"] {
      --theme-primary: #FFFFFF;
      --theme-secondary: #E5E7EB;
      --theme-rgb-primary: 255, 255, 255;
    }

    /* Material Symbols */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .fill-icon {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* Glass Effect */
    .glass {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }
    .glass-strong {
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    /* Typography */
    .font-display-lg { font-family: var(--font-display); font-size: 48px; font-weight: 800; line-height: 1.2; letter-spacing: -0.02em; }
    .font-headline-md { font-family: var(--font-headline); font-size: 24px; font-weight: 700; line-height: 1.4; }
    .font-headline-sm { font-family: var(--font-headline); font-size: 20px; font-weight: 600; line-height: 1.4; }
    .font-body-lg { font-family: var(--font-body); font-size: 16px; font-weight: 400; line-height: 1.6; }
    .font-body-md { font-family: var(--font-body); font-size: 14px; font-weight: 400; line-height: 1.6; }
    .font-label-md { font-family: var(--font-label); font-size: 12px; font-weight: 600; line-height: 1.2; }

    /* Entry Card */
    .entry-card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.4);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .entry-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.15);
      background: rgba(255, 255, 255, 0.35);
    }
    .entry-card-icon {
      width: 56px;
      height: 56px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      transition: all 0.3s ease;
    }

    /* Theme Button */
    .theme-btn {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 56px;
      height: 56px;
      border-radius: 9999px;
      background: var(--color-glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--color-glass-border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 9999;
    }
    .theme-btn:hover { transform: scale(1.1); background: rgba(255, 255, 255, 0.8); }

    /* Theme Panel */
    .theme-panel {
      position: fixed;
      bottom: 100px;
      right: 32px;
      background: var(--color-glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--color-glass-border);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.12);
      z-index: 9998;
    }

    /* Floating Bubbles */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(255,255,255,0.1));
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      animation: floatBubble linear infinite;
    }
    .bubble-1 { width: 80px; height: 80px; top: 10%; left: 5%; animation-duration: 18s; opacity: 0.6; }
    .bubble-2 { width: 120px; height: 120px; top: 60%; left: 80%; animation-duration: 25s; opacity: 0.5; animation-delay: 3s; }
    .bubble-3 { width: 60px; height: 60px; top: 70%; left: 15%; animation-duration: 20s; opacity: 0.7; animation-delay: 6s; }
    .bubble-4 { width: 100px; height: 100px; top: 20%; left: 70%; animation-duration: 22s; opacity: 0.55; animation-delay: 9s; }
    .bubble-5 { width: 50px; height: 50px; top: 45%; left: 45%; animation-duration: 15s; opacity: 0.65; animation-delay: 12s; }

    [data-mode="dark"] .bubble {
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
      border-color: rgba(255, 255, 255, 0.1);
    }

    @keyframes floatBubble {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(20px, -30px) scale(1.05); }
      50% { transform: translate(-10px, -50px) scale(0.95); }
      75% { transform: translate(15px, -20px) scale(1.02); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-up { animation: slideUp 0.4s ease; }

    /* Pill Badge */
    .pill {
      border-radius: 9999px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
    }
  </style>
  <style>
    
  </style>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <!-- 公共样式表 -->
  <link rel="stylesheet" href="shop-common.css"/>


  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#004ac6',
            secondary: '#2563eb',
          },
          fontFamily: {
            display: ['Manrope', 'system-ui', 'sans-serif'],
            headline: ['Manrope', 'system-ui', 'sans-serif'],
            body: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
</head>
<body class="bg-gradient-to-br from-slate-100 via-purple-50 to-pink-50 dark:from-slate-900 dark:via-purple-900/20 dark:to-slate-900 min-h-screen">
  <div id="app">
    <!-- Background Mesh with Floating Bubbles -->
    <div class="bg-mesh fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
      <div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] rounded-full bg-blue-200/40 dark:bg-slate-700/60 blur-[120px]"></div>
      <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-purple-200/40 dark:bg-slate-800/60 blur-[150px]"></div>
      <div class="absolute top-[30%] right-[20%] w-[30%] h-[30%] rounded-full bg-orange-200/30 dark:bg-slate-900/60 blur-[100px]"></div>
      <!-- Floating Bubbles -->
      <div class="bubble bubble-1"></div>
      <div class="bubble bubble-2"></div>
      <div class="bubble bubble-3"></div>
      <div class="bubble bubble-4"></div>
      <div class="bubble bubble-5"></div>
    </div>

    <!-- Main Content -->
    <div class="relative z-10 min-h-screen flex flex-col items-center justify-center px-8 py-12">
      <!-- Header -->
      <header class="text-center mb-12">
        <div class="inline-flex items-center gap-3 mb-6">
          <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-[#004ac6] to-[#712ae2] flex items-center justify-center text-white shadow-lg">
            <span class="material-symbols-outlined fill-icon text-3xl">storefront</span>
          </div>
          <div class="flex flex-col text-left">
            <span class="text-3xl font-extrabold text-[#191b23] dark:text-white font-display leading-tight">店铺管理平台</span>
            <span class="text-sm text-[#737686] dark:text-[#a0a4b8] uppercase tracking-wider font-semibold">Multi-Shop Points Mall</span>
          </div>
        </div>
        <p class="font-body-lg text-[#434655] dark:text-[#a0a4b8] max-w-md mx-auto">
          多店铺积分商城系统管理后台，统一管理店铺、商品、用户与订单
        </p>
      </header>

      <!-- Entry Cards Grid -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6 max-w-4xl w-full">
        <div v-for="card in entryCards" :key="card.id"
             class="entry-card text-center"
             :style="{ '--card-bg': card.bgColor }"
             @click="handleCardClick(card)">
          <div class="entry-card-icon mx-auto" :style="{ background: card.bgGradient }">
            <span class="material-symbols-outlined text-2xl" :class="{ 'fill-icon': card.filled }" :style="{ color: card.iconColor }">{{ card.icon }}</span>
          </div>
          <h3 class="font-headline-sm text-[#191b23] dark:text-white mb-2">{{ card.name }}</h3>
          <p class="font-body-md text-[#737686] dark:text-[#a0a4b8] text-sm">{{ card.desc }}</p>
        </div>
      </div>

      <!-- Quick Stats -->
      <div class="mt-12 glass-strong rounded-3xl p-6 max-w-4xl w-full">
        <div class="grid grid-cols-4 gap-6 text-center">
          <div>
            <p class="font-points-display text-[#004ac6] dark:text-white">128</p>
            <p class="font-label-md text-[#737686] dark:text-[#a0a4b8]">店铺总数</p>
          </div>
          <div>
            <p class="font-points-display text-[#10B981]">3,456</p>
            <p class="font-label-md text-[#737686] dark:text-[#a0a4b8]">用户总数</p>
          </div>
          <div>
            <p class="font-points-display text-[#F59E0B]">89K</p>
            <p class="font-label-md text-[#737686] dark:text-[#a0a4b8]">积分总量</p>
          </div>
          <div>
            <p class="font-points-display text-[#EC4899]">12,580</p>
            <p class="font-label-md text-[#737686] dark:text-[#a0a4b8]">订单总量</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Theme Toggle Button -->
    <button @click="showThemePanel = !showThemePanel" class="theme-btn group">
      <span class="material-symbols-outlined text-2xl group-hover:rotate-45 transition-transform duration-500">palette</span>
    </button>

    <!-- Theme Selection Panel -->
    <transition name="fade">
      <div v-if="showThemePanel" class="theme-panel animate-slide-up">
        <!-- Color Theme Selection -->
        <div class="mb-6">
          <p class="font-label-md text-[#737686] mb-3">主题颜色</p>
          <div class="flex gap-3 flex-wrap">
            <button @click="setTheme('')" class="w-10 h-10 rounded-full bg-[#004ac6] border-2 border-white shadow-md hover:scale-110 transition-all" title="科技蓝"></button>
            <button @click="setTheme('fresh-green')" class="w-10 h-10 rounded-full bg-[#10B981] border-2 border-white shadow-md hover:scale-110 transition-all" title="清新绿"></button>
            <button @click="setTheme('romantic-purple')" class="w-10 h-10 rounded-full bg-[#8B5CF6] border-2 border-white shadow-md hover:scale-110 transition-all" title="浪漫紫"></button>
            <button @click="setTheme('vibrant-pink')" class="w-10 h-10 rounded-full bg-[#EC4899] border-2 border-white shadow-md hover:scale-110 transition-all" title="活力粉"></button>
            <button @click="setTheme('pure-white')" class="w-10 h-10 rounded-full bg-[#1F2937] border-2 border-white shadow-md hover:scale-110 transition-all" title="纯净白"></button>
          </div>
        </div>

        <!-- Dark Mode Toggle -->
        <div class="flex items-center justify-between">
          <span class="font-body-md text-[#737686]">暗色模式</span>
          <button @click="toggleDarkMode" :class="['w-12 h-6 rounded-full relative transition-all duration-200', isDark ? 'bg-[#004ac6]' : 'bg-[#e7e7f3]']">
            <span :class="['absolute top-1 w-4 h-4 rounded-full bg-white shadow transition-all duration-200', isDark ? 'left-7' : 'left-1']"></span>
          </button>
        </div>
      </div>
    </transition>
  </div>

  <script>
    const { createApp, ref } = Vue;

    createApp({
      setup() {
        const showThemePanel = ref(false);
        const isDark = ref(false);

        const entryCards = ref([
          { id: 'dashboard', name: '仪表盘', icon: 'dashboard', desc: '数据概览与统计', filled: true, bgGradient: 'rgba(0, 74, 198, 0.1)', iconColor: '#004ac6' },
          { id: 'products', name: '商品管理', icon: 'inventory_2', desc: '商品上架与编辑', filled: false, bgGradient: 'rgba(16, 185, 129, 0.1)', iconColor: '#10B981' },
          { id: 'users', name: '用户管理', icon: 'group', desc: '会员信息管理', filled: false, bgGradient: 'rgba(139, 92, 246, 0.1)', iconColor: '#8B5CF6' },
          { id: 'orders', name: '订单管理', icon: 'receipt_long', desc: '订单查询与处理', filled: false, bgGradient: 'rgba(245, 158, 11, 0.1)', iconColor: '#F59E0B' },
          { id: 'categories', name: '分类管理', icon: 'category', desc: '商品分类维护', filled: false, bgGradient: 'rgba(236, 72, 153, 0.1)', iconColor: '#EC4899' },
          { id: 'messages', name: '消息通知', icon: 'notifications', desc: '站内消息管理', filled: true, bgGradient: 'rgba(239, 68, 68, 0.1)', iconColor: '#EF4444' },
          { id: 'myshop', name: '我的店铺', icon: 'storefront', desc: '店铺信息管理', filled: true, bgGradient: 'rgba(0, 74, 198, 0.1)', iconColor: '#004ac6' },
          { id: 'profile', name: '个人中心', icon: 'account_circle', desc: '账户设置管理', filled: true, bgGradient: 'rgba(75, 75, 75, 0.1)', iconColor: '#4b5563' }
        ]);

        const setTheme = (theme) => {
          if (theme) {
            document.documentElement.setAttribute('data-theme', theme);
          } else {
            document.documentElement.removeAttribute('data-theme');
          }
        };

        const toggleDarkMode = () => {
          isDark.value = !isDark.value;
          if (isDark.value) {
            document.documentElement.setAttribute('data-mode', 'dark');
          } else {
            document.documentElement.removeAttribute('data-mode');
          }
        };

        const handleCardClick = (card) => {
          console.log('Navigate to:', card.id);
        };

        return {
          showThemePanel,
          isDark,
          entryCards,
          setTheme,
          toggleDarkMode,
          handleCardClick
        };
      }
    }).mount('#app');
  </script>

  <style>
    .font-points-display {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.01em;
    }
    .fade-enter-active, .fade-leave-active {
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .fade-enter-from, .fade-leave-to {
      opacity: 0;
      transform: translateY(10px);
    }
  </style>
</body>
</html>
