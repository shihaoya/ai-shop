<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>统一后台布局 - 多店铺积分商城</title>
  <script src="https://unpkg.com/vue@3.4.0/dist/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../variables.css"/>
  <style>
    /* Theme Variables */
    :root {
      --theme-primary: #004ac6;
      --theme-secondary: #2563eb;
      --theme-rgb-primary: 0, 74, 198;
      --theme-gradient: linear-gradient(135deg, #004ac6 0%, #2563eb 100%);
      --color-on-primary: #ffffff;
      --color-success: #10B981;
      --color-warning: #F59E0B;
      --color-danger: #EF4444;
      --color-outline: #737686;
      --color-on-surface: #191b23;
      --color-on-surface-variant: #434655;
      --color-glass-bg: rgba(255, 255, 255, 0.6);
      --color-glass-border: rgba(255, 255, 255, 0.3);
      --font-display: 'Manrope', system-ui, sans-serif;
      --font-headline: 'Manrope', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --font-label: 'Inter', system-ui, sans-serif;
    }

    [data-theme="fresh-green"] {
      --theme-primary: #10B981;
      --theme-secondary: #059669;
      --theme-rgb-primary: 16, 185, 129;
    }

    [data-theme="romantic-purple"] {
      --theme-primary: #8B5CF6;
      --theme-secondary: #7C3AED;
      --theme-rgb-primary: 139, 92, 246;
    }

    [data-theme="vibrant-pink"] {
      --theme-primary: #EC4899;
      --theme-secondary: #DB2777;
      --theme-rgb-primary: 236, 72, 153;
    }

    [data-theme="pure-white"] {
      --theme-primary: #1F2937;
      --theme-secondary: #374151;
      --theme-rgb-primary: 31, 41, 55;
    }

    [data-theme="classic-black"] {
      --theme-primary: #FFFFFF;
      --theme-secondary: #E5E7EB;
      --theme-rgb-primary: 255, 255, 255;
    }

    [data-mode="dark"] {
      --color-surface: #121218;
      --color-on-surface: #f0f0fb;
      --color-on-surface-variant: #a0a4b8;
      --color-glass-bg: rgba(0, 0, 0, 0.4);
      --color-glass-border: rgba(255, 255, 255, 0.1);
    }

    [data-mode="dark"] .glass {
      background: rgba(30, 30, 45, 0.85);
      border-color: rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    [data-mode="dark"] .glass-strong {
      background: rgba(40, 40, 60, 0.9);
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    [data-mode="dark"] .sidebar-float {
      background: rgba(20, 20, 35, 0.5);
      border-color: rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
    }

    [data-mode="dark"] .topbar-float {
      background: rgba(25, 25, 45, 0.5);
      border-color: rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.3);
    }

    [data-mode="dark"] .content-area {
      background: rgba(25, 25, 50, 0.35);
      border-color: rgba(255, 255, 255, 0.06);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
    }

    .glass {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.03), inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .glass-strong {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 20px;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .glass-content {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .fill-icon {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* Sidebar Float - rounded-3xl (40px), m-4 (16px) */
    .sidebar-float {
      margin: 16px;
      width: 260px;
      height: calc(100vh - 32px);
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    }

    .topbar-float {
      margin: 16px;
      margin-left: 0;
      height: 68px;
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 20px;
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
    }

    .content-area {
      margin: 16px;
      margin-left: 0;
      margin-right: 16px;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
    }

    .theme-btn {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 56px;
      height: 56px;
      border-radius: 9999px;
      background: var(--color-glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--color-glass-border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 9999;
    }

    .theme-btn:hover {
      transform: scale(1.1);
      background: rgba(255, 255, 255, 0.8);
    }

    .theme-panel {
      position: fixed;
      bottom: 100px;
      right: 32px;
      background: var(--color-glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--color-glass-border);
      border-radius: 32px;
      padding: 24px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.12);
      z-index: 9998;
    }

    /* Navigation Items */
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 16px;
      color: #4b5563;
      transition: all 0.25s ease;
      cursor: pointer;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 14px;
      border: 1px solid transparent;
      text-decoration: none;
    }

    .nav-item:hover {
      background: rgba(102, 126, 234, 0.1);
      color: var(--theme-primary);
      transform: translateX(4px);
      border-color: rgba(102, 126, 234, 0.2);
    }

    .nav-item.active {
      background: linear-gradient(135deg, var(--theme-primary), var(--theme-secondary));
      color: white;
      box-shadow: 0 8px 32px rgba(var(--theme-rgb-primary), 0.35);
      border-color: transparent;
    }

    [data-mode="dark"] .nav-item {
      color: #9ca3af;
    }

    [data-mode="dark"] .nav-item:hover {
      background: rgba(102, 126, 234, 0.15);
      color: #a5b4fc;
      border-color: rgba(102, 126, 234, 0.3);
    }

    .nav-item-icon {
      font-size: 20px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: var(--color-outline);
      border-radius: 3px;
      opacity: 0.5;
    }

    /* Stat Card */
    .stat-card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.4);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.2);
    }

    /* Data Table */
    .data-table {
      background: var(--color-glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--color-glass-border);
      border-radius: 24px;
      overflow: hidden;
    }

    .data-table table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table thead {
      background: rgba(0, 0, 0, 0.02);
    }

    .data-table th {
      padding: 16px 24px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-on-surface-variant);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .data-table td {
      padding: 16px 24px;
      font-size: 14px;
      color: var(--color-on-surface);
      border-top: 1px solid var(--color-glass-border);
    }

    .data-table tbody tr {
      transition: background 0.2s ease;
    }

    .data-table tbody tr:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    /* Status Badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-badge-pending {
      background: rgba(245, 158, 11, 0.1);
      color: var(--color-warning);
    }

    .status-badge-approved {
      background: rgba(16, 185, 129, 0.1);
      color: var(--color-success);
    }

    .status-badge-rejected {
      background: rgba(239, 68, 68, 0.1);
      color: var(--color-danger);
    }

    .status-badge-admin {
      background: rgba(239, 68, 68, 0.1);
      color: var(--color-danger);
    }

    .status-badge-shop-user {
      background: rgba(37, 99, 235, 0.1);
      color: #2563eb;
    }

    .status-badge-user {
      background: rgba(115, 115, 115, 0.1);
      color: #737686;
    }

    /* Floating Bubbles */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(255,255,255,0.1));
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      animation: floatBubble linear infinite;
    }

    .bubble-1 { width: 80px; height: 80px; top: 10%; left: 5%; animation-duration: 18s; opacity: 0.6; }
    .bubble-2 { width: 120px; height: 120px; top: 60%; left: 80%; animation-duration: 25s; opacity: 0.5; animation-delay: 3s; }
    .bubble-3 { width: 60px; height: 60px; top: 70%; left: 15%; animation-duration: 20s; opacity: 0.7; animation-delay: 6s; }
    .bubble-4 { width: 100px; height: 100px; top: 20%; left: 70%; animation-duration: 22s; opacity: 0.55; animation-delay: 9s; }
    .bubble-5 { width: 50px; height: 50px; top: 45%; left: 45%; animation-duration: 15s; opacity: 0.65; animation-delay: 12s; }

    [data-mode="dark"] .bubble {
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
      border-color: rgba(255, 255, 255, 0.1);
    }

    @keyframes floatBubble {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(20px, -30px) scale(1.05); }
      50% { transform: translate(-10px, -50px) scale(0.95); }
      75% { transform: translate(15px, -20px) scale(1.02); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.3s ease;
    }

    .animate-slide-up {
      animation: slideUp 0.4s ease;
    }

    /* Fade Transition */
    .fade-enter-active,
    .fade-leave-active {
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .fade-enter-from,
    .fade-leave-to {
      opacity: 0;
      transform: translateY(10px);
    }

    /* Button Styles */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font-body);
      font-weight: 600;
      border-radius: 12px;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      padding: 0 16px;
      height: 36px;
      font-size: 13px;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--theme-primary);
      color: var(--color-on-primary);
      box-shadow: 0 8px 32px rgba(var(--theme-rgb-primary), 0.3);
    }

    .btn-primary:hover {
      filter: brightness(1.1);
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid var(--theme-primary);
      color: var(--theme-primary);
    }

    .btn-secondary:hover {
      background: rgba(var(--theme-rgb-primary), 0.05);
    }

    .btn-ghost {
      background: transparent;
      color: var(--theme-primary);
    }

    .btn-ghost:hover {
      background: rgba(var(--theme-rgb-primary), 0.1);
    }

    .btn-danger {
      background: var(--color-danger);
      color: white;
      box-shadow: 0 8px 32px rgba(239, 68, 68, 0.3);
    }

    /* Input Styles */
    .input {
      width: 100%;
      height: 40px;
      padding: 0 16px;
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--color-on-surface);
      transition: all 0.2s ease;
    }

    .input::placeholder {
      color: var(--color-outline);
    }

    .input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.6);
      border-color: rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 0 2px rgba(var(--theme-rgb-primary), 0.2);
    }

    /* Message Card */
    .message-card {
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .message-card:hover {
      background: rgba(255, 255, 255, 0.5);
      transform: translateY(-2px);
    }

    .message-card.unread {
      background: rgba(var(--theme-rgb-primary), 0.05);
      border-color: rgba(var(--theme-rgb-primary), 0.2);
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#004ac6",
            secondary: "#712ae2",
            "on-surface": "#191b23",
            "on-surface-variant": "#434655",
            outline: "#737686",
            success: "#10B981",
            warning: "#F59E0B",
            danger: "#EF4444",
            "glass-bg": "rgba(255, 255, 255, 0.6)",
            "glass-border": "rgba(255, 255, 255, 0.3)",
          },
          borderRadius: {
            "3xl": "2.5rem",
          },
          fontFamily: {
            display: ["Manrope", "system-ui", "sans-serif"],
            headline: ["Manrope", "system-ui", "sans-serif"],
            body: ["Inter", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
</head>
<body class="bg-[#faf8ff] dark:bg-[#121218] min-h-screen flex overflow-hidden relative font-body antialiased">
  <div id="app">
    <!-- Atmospheric Background -->
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
      <div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] rounded-full bg-blue-200 dark:bg-slate-700 blur-[120px] opacity-40 mix-blend-multiply"></div>
      <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-purple-200 dark:bg-slate-800 blur-[150px] opacity-30 mix-blend-multiply"></div>
      <div class="absolute top-[30%] right-[20%] w-[30%] h-[30%] rounded-full bg-orange-200 dark:bg-slate-900 blur-[100px] opacity-20 mix-blend-multiply"></div>
      <div class="bubble bubble-1"></div>
      <div class="bubble bubble-2"></div>
      <div class="bubble bubble-3"></div>
      <div class="bubble bubble-4"></div>
      <div class="bubble bubble-5"></div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar-float flex flex-col fixed left-0 top-0 z-40">
      <!-- Logo Area -->
      <div class="p-6 border-b border-white/30">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-[#004ac6] to-[#712ae2] flex items-center justify-center text-white shadow-lg">
            <span class="material-symbols-outlined fill-icon text-2xl">generating_tokens</span>
          </div>
          <div class="flex flex-col">
            <span class="text-lg font-bold text-[#191b23] dark:text-white leading-tight">积分商城</span>
            <span class="text-xs text-[#737686] dark:text-[#a0a4b8] uppercase tracking-wider font-semibold">管理系统</span>
          </div>
        </div>
      </div>

      <!-- Navigation Menu -->
      <nav class="flex-1 px-4 py-6 flex flex-col gap-2 overflow-y-auto custom-scrollbar">
        <a v-for="(item, index) in navItems" :key="index"
           :href="item.href"
           :class="['nav-item', { active: item.active }]"
           @click="setActive(index)">
          <span class="material-symbols-outlined nav-item-icon" :class="{ 'fill-icon': item.active }">{{ item.icon }}</span>
          <span>{{ item.name }}</span>
        </a>
      </nav>

      <!-- Bottom User -->
      <div class="px-4 mt-auto border-t border-white/30 pt-4">
        <div class="flex items-center gap-3 px-4 py-3">
          <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#004ac6] to-[#712ae2] flex items-center justify-center text-white">
            <span class="text-sm font-bold">Admin</span>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold text-[#191b23] dark:text-white truncate">系统管理员</p>
            <p class="text-xs text-[#737686] dark:text-[#a0a4b8] truncate">admin@example.com</p>
          </div>
          <button class="p-2 rounded-xl hover:bg-red-50 dark:hover:bg-red-900/20 text-[#737686] hover:text-[#EF4444] transition-all">
            <span class="material-symbols-outlined text-lg">logout</span>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Content Wrapper -->
    <div class="flex flex-col relative z-10" :style="{ marginLeft: '292px', width: 'calc(100vw - 324px)', height: '100vh' }">
      <!-- Top Navigation Bar -->
      <header class="topbar-float flex items-center justify-between px-6" style="width: calc(100% - 0px);">
        <!-- Left Side - Page Title & Breadcrumb -->
        <div class="flex items-center gap-4">
          <h1 class="text-xl font-bold text-[#191b23] dark:text-white">{{ pageTitle }}</h1>
          <span class="text-[#737686]">/</span>
          <span class="text-sm text-[#737686]">{{ breadcrumb }}</span>
        </div>

        <!-- Right Side -->
        <div class="flex items-center gap-4">
          <!-- Search Box -->
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[#737686] text-lg">search</span>
            <input
              v-model="searchQuery"
              class="bg-white/40 border border-white/50 rounded-full py-2.5 pl-12 pr-6 text-sm text-[#191b23] placeholder-[#737686] focus:outline-none focus:ring-2 focus:ring-[#004ac6]/20 focus:bg-white/60 focus:border-white/70 transition-all w-48"
              placeholder="搜索..."
              type="text"
            />
          </div>

          <!-- Action Buttons Group -->
          <div class="flex items-center gap-2 bg-white/50 p-1.5 rounded-2xl">
            <!-- Theme Toggle Button -->
            <button @click="showThemePanel = !showThemePanel" class="p-2 rounded-xl hover:bg-white transition-all text-[#737686] hover:text-[#004ac6]">
              <span class="material-symbols-outlined">palette</span>
            </button>

            <!-- Notification Button -->
            <button class="p-2 rounded-xl hover:bg-white transition-all text-[#737686] hover:text-[#004ac6] relative">
              <span class="material-symbols-outlined">notifications</span>
              <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-[#EF4444] rounded-full"></span>
            </button>

            <!-- User Avatar -->
            <button class="p-1.5 rounded-xl hover:bg-white transition-all text-[#737686] hover:text-[#004ac6]">
              <span class="material-symbols-outlined">account_circle</span>
            </button>
          </div>
        </div>
      </header>

      <!-- Content Area -->
      <main class="content-area overflow-y-auto p-6" style="flex: 1;">
        <!-- Page content slot - 子页面内容会插入到这里 -->
        <slot name="content"></slot>
      </main>
    </div>

    <!-- Theme Toggle Button -->
    <button
      @click="showThemePanel = !showThemePanel"
      class="theme-btn group"
    >
      <span class="material-symbols-outlined text-2xl group-hover:rotate-45 transition-transform duration-500">dark_mode</span>
    </button>

    <!-- Theme Selection Panel -->
    <transition name="fade">
      <div v-if="showThemePanel" class="theme-panel animate-slide-up">
        <!-- Color Theme Selection -->
        <div class="mb-6">
          <p class="text-xs font-semibold text-[#737686] mb-3 uppercase tracking-wider">主题颜色</p>
          <div class="flex gap-3">
            <button
              @click="setTheme('')"
              class="w-10 h-10 rounded-full bg-[#004ac6] border-2 border-white shadow-md hover:scale-110 transition-all"
              title="科技蓝"
            ></button>
            <button
              @click="setTheme('fresh-green')"
              class="w-10 h-10 rounded-full bg-[#10B981] border-2 border-white shadow-md hover:scale-110 transition-all"
              title="清新绿"
            ></button>
            <button
              @click="setTheme('romantic-purple')"
              class="w-10 h-10 rounded-full bg-[#8B5CF6] border-2 border-white shadow-md hover:scale-110 transition-all"
              title="浪漫紫"
            ></button>
            <button
              @click="setTheme('vibrant-pink')"
              class="w-10 h-10 rounded-full bg-[#EC4899] border-2 border-white shadow-md hover:scale-110 transition-all"
              title="活力粉"
            ></button>
            <button
              @click="setTheme('pure-white')"
              class="w-10 h-10 rounded-full bg-[#1F2937] border-2 border-white shadow-md hover:scale-110 transition-all"
              title="纯净白"
            ></button>
          </div>
        </div>

        <!-- Dark Mode Toggle -->
        <div class="flex items-center justify-between">
          <span class="text-sm text-[#737686]">暗色模式</span>
          <button
            @click="toggleDarkMode"
            :class="[
              'w-12 h-6 rounded-full relative transition-all duration-200',
              isDark ? 'bg-[#004ac6]' : 'bg-[#e7e7f3]'
            ]"
          >
            <span
              :class="[
                'absolute top-1 w-4 h-4 rounded-full bg-white shadow transition-all duration-200',
                isDark ? 'left-7' : 'left-1'
              ]"
            ></span>
          </button>
        </div>
      </div>
    </transition>
  </div>

  <script>
    const { createApp, ref, provide } = Vue;

    createApp({
      setup() {
        const navItems = ref([
          { name: '仪表盘', icon: 'dashboard', href: 'dashboard.html', active: true },
          { name: '店铺管理', icon: 'storefront', href: 'shops.html', active: false },
          { name: '用户管理', icon: 'group', href: 'users.html', active: false },
          { name: '我的消息', icon: 'notifications', href: 'messages.html', active: false }
        ]);

        const searchQuery = ref('');
        const showThemePanel = ref(false);
        const isDark = ref(false);
        const pageTitle = ref('仪表盘');
        const breadcrumb = ref('首页');

        const setActive = (index) => {
          navItems.value.forEach((item, i) => {
            item.active = i === index;
          });
          pageTitle.value = navItems.value[index].name;
        };

        const setTheme = (theme) => {
          if (theme) {
            document.documentElement.setAttribute('data-theme', theme);
          } else {
            document.documentElement.removeAttribute('data-theme');
          }
        };

        const toggleDarkMode = () => {
          isDark.value = !isDark.value;
          if (isDark.value) {
            document.documentElement.setAttribute('data-mode', 'dark');
          } else {
            document.documentElement.removeAttribute('data-mode');
          }
        };

        return {
          navItems,
          searchQuery,
          showThemePanel,
          isDark,
          pageTitle,
          breadcrumb,
          setActive,
          setTheme,
          toggleDarkMode
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
