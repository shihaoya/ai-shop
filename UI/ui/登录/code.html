<!DOCTYPE html>

<style>
        .backdrop-blur-25 {
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }
    </style>
</head>
<body class="relative min-h-screen flex items-center justify-center overflow-hidden bg-background selection:bg-tech-blue selection:text-white">
<div class="absolute inset-0 z-0 bg-[#f8f9ff] overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[60vw] h-[60vw] bg-[#b4c5ff] rounded-full mix-blend-multiply filter blur-[120px] opacity-60 animate-blob"></div>
<div class="absolute top-[-5%] right-[-10%] w-[50vw] h-[50vw] bg-[#eaddff] rounded-full mix-blend-multiply filter blur-[100px] opacity-60 animate-blob animation-delay-2000"></div>
<div class="absolute bottom-[-20%] left-[20%] w-[70vw] h-[70vw] bg-[#dbe1ff] rounded-full mix-blend-multiply filter blur-[140px] opacity-70 animate-blob animation-delay-4000"></div>
</div>
<div class="relative z-10 w-full max-w-[440px] px-md">
<div class="bg-white/40 backdrop-blur-25 border border-white/80 shadow-[0_8px_32px_rgba(0,0,0,0.04),0_2px_4px_rgba(0,0,0,0.02),inset_0_1px_1px_rgba(255,255,255,0.8)] rounded-2xl p-10 flex flex-col gap-lg">
<div class="text-center flex flex-col items-center gap-sm mb-sm">
<div class="w-16 h-16 rounded-xl bg-gradient-to-br from-tech-blue to-primary flex items-center justify-center shadow-lg shadow-tech-blue/20 mb-sm border border-white/20">
<span class="material-symbols-outlined text-on-primary text-[32px]">admin_panel_settings</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface tracking-tight">系统管理员登录</h1>
<p class="font-body-md text-body-md text-on-surface-variant">多店铺积分管理系统</p>
</div>
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-unit" for="username">管理账号</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-outline-variant text-[20px] z-10">person</span>
<input class="w-full bg-white/60 backdrop-blur-md border border-white/40 shadow-inner focus:border-tech-blue focus:ring-2 focus:ring-tech-blue/30 rounded-xl pl-xl pr-md py-[12px] font-headline-sm text-[15px] font-medium text-on-surface placeholder:text-outline transition-all outline-none" id="username" placeholder="请输入管理员账号" type="text"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-unit" for="password">安全密码</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-outline-variant text-[20px] z-10">lock</span>
<input class="w-full bg-white/60 backdrop-blur-md border border-white/40 shadow-inner focus:border-tech-blue focus:ring-2 focus:ring-tech-blue/30 rounded-xl pl-xl pr-xl py-[12px] font-headline-sm text-[15px] font-medium text-on-surface placeholder:text-outline transition-all outline-none" id="password" placeholder="请输入密码" type="password"/>
<button class="absolute right-sm text-outline-variant hover:text-tech-blue transition-colors flex items-center justify-center cursor-pointer z-10" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<div class="flex items-center justify-between mt-xs">
<label class="flex items-center gap-xs cursor-pointer group">
<input class="w-4 h-4 rounded-sm border-outline-variant text-tech-blue focus:ring-tech-blue focus:ring-offset-0 bg-white/50 cursor-pointer" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">记住账号</span>
</label>
<a class="font-body-md text-body-md text-tech-blue hover:text-primary transition-colors" href="#">忘记密码？</a>
</div>
<button class="mt-sm w-full bg-gradient-to-r from-tech-blue to-primary hover:from-primary hover:to-primary-fixed-dim text-on-primary font-headline-sm text-[16px] py-3 rounded-xl shadow-[0_4px_14px_rgba(37,99,235,0.25)] transform active:scale-[0.98] transition-all flex items-center justify-center gap-xs border border-white/10" type="button">
<span>登录系统</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
</div>
<div class="mt-lg text-center">
<p class="font-label-md text-label-md text-outline">© 2024 多店铺积分管理系统. All rights reserved.</p>
</div>
</div>
<button class="fixed bottom-8 right-8 z-50 w-12 h-12 rounded-full bg-white/70 backdrop-blur-xl border border-white/80 shadow-[0_4px_16px_rgba(0,0,0,0.1)] flex items-center justify-center text-tech-blue hover:bg-white hover:scale-110 transition-all duration-300 group">
<span class="material-symbols-outlined text-[24px] group-hover:rotate-180 transition-transform duration-500">palette</span>
</button>
